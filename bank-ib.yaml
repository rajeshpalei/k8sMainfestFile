apiVersion: apps/v1
kind: Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-ib
  namespace: prod
  labels:
    env: bank-ib
spec:
  replicas: 2
  selector:
    matchLabels:
      env: bank-ib
  template:
    metadata:
      labels:
        env: bank-ib
    spec:
      containers:
        - name: bank-ib
          image: rajeshpalei/ib
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: ib-svc
  labels:
    env: bank-ib
  namespace: prod
spec:
  type: LoadBalancer
  selector:
    env: bank-ib
  ports:
    - port: 80
      targetPort: 80
...
